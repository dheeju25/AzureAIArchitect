<svg width="100%" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: system-ui, sans-serif; }
      .th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .ts { font-size: 12px; font-weight: 400; fill: #555; }
      .arr { stroke: #888; stroke-width: 1.5; fill: none; }
      /* layer fills */
      .l-gray   { fill: #f5f5f4; stroke: #b4b2a9; }
      .l-blue   { fill: #e6f1fb; stroke: #85b7eb; }
      .l-teal   { fill: #e1f5ee; stroke: #5dcaa5; }
      .l-purple { fill: #eeedfe; stroke: #afa9ec; }
      .l-coral  { fill: #faece7; stroke: #f0997b; }
      .l-amber  { fill: #faeeda; stroke: #ef9f27; }
      .l-green  { fill: #eaf3de; stroke: #97c459; }
    </style>
  </defs>

  <!-- Outer container -->
  <rect x="20" y="20" width="640" height="600" rx="18" class="l-gray" stroke-width="0.5"/>
  <text class="th" x="340" y="48" text-anchor="middle">AzureAIArchitect — Node.js / TypeScript app</text>

  <!-- Frontend -->
  <rect x="44" y="64" width="592" height="64" rx="10" class="l-blue" stroke-width="0.5"/>
  <text class="th" x="340" y="90" text-anchor="middle">Frontend</text>
  <text class="ts" x="340" y="108" text-anchor="middle">index.html — upload UI · dashboard.html — trace viewer</text>

  <!-- Middleware -->
  <rect x="44" y="146" width="284" height="56" rx="10" class="l-teal" stroke-width="0.5"/>
  <text class="th" x="186" y="168" text-anchor="middle">Upload middleware</text>
  <text class="ts" x="186" y="184" text-anchor="middle">Multer · file type detect</text>

  <rect x="352" y="146" width="284" height="56" rx="10" class="l-teal" stroke-width="0.5"/>
  <text class="th" x="494" y="168" text-anchor="middle">Tracing middleware</text>
  <text class="ts" x="494" y="184" text-anchor="middle">traceId per request · OpenTelemetry</text>

  <!-- Services -->
  <rect x="44" y="220" width="180" height="56" rx="10" class="l-purple" stroke-width="0.5"/>
  <text class="th" x="134" y="242" text-anchor="middle">WebSocket service</text>
  <text class="ts" x="134" y="258" text-anchor="middle">Socket.io progress</text>

  <rect x="246" y="220" width="188" height="56" rx="10" class="l-purple" stroke-width="0.5"/>
  <text class="th" x="340" y="242" text-anchor="middle">Trace query service</text>
  <text class="ts" x="340" y="258" text-anchor="middle">Query · metrics · details</text>

  <rect x="456" y="220" width="180" height="56" rx="10" class="l-purple" stroke-width="0.5"/>
  <text class="th" x="546" y="242" text-anchor="middle">File processor</text>
  <text class="ts" x="546" y="258" text-anchor="middle">PNG · SVG · PDF · draw.io</text>

  <!-- Agent pipeline container -->
  <rect x="44" y="294" width="592" height="228" rx="12" class="l-amber" stroke-width="0.5"/>
  <text class="th" x="340" y="316" text-anchor="middle">Agentic pipeline (BaseAgent + real LLM calls)</text>

  <!-- Orchestrator -->
  <rect x="230" y="328" width="220" height="48" rx="8" class="l-coral" stroke-width="0.5"/>
  <text class="th" x="340" y="348" text-anchor="middle">OrchestratorAgent</text>
  <text class="ts" x="340" y="364" text-anchor="middle">Routes · tracks progress 0–100%</text>

  <!-- 4 agents -->
  <rect x="60" y="398" width="132" height="48" rx="8" class="l-blue" stroke-width="0.5"/>
  <text class="th" x="126" y="418" text-anchor="middle">AnalyzerAgent</text>
  <text class="ts" x="126" y="434" text-anchor="middle">Vision · Zod schema</text>

  <rect x="210" y="398" width="132" height="48" rx="8" class="l-blue" stroke-width="0.5"/>
  <text class="th" x="276" y="418" text-anchor="middle">PolicyAgent</text>
  <text class="ts" x="276" y="434" text-anchor="middle">HIPAA · PCI · SOX</text>

  <rect x="360" y="398" width="132" height="48" rx="8" class="l-blue" stroke-width="0.5"/>
  <text class="th" x="426" y="418" text-anchor="middle">CostAgent</text>
  <text class="ts" x="426" y="434" text-anchor="middle">Estimate · optimize</text>

  <rect x="510" y="398" width="110" height="48" rx="8" class="l-blue" stroke-width="0.5"/>
  <text class="th" x="565" y="418" text-anchor="middle">GeneratorAgent</text>
  <text class="ts" x="565" y="434" text-anchor="middle">Bicep · YAML · ZIP</text>

  <!-- Orchestrator to agent arrows -->
  <line x1="280" y1="376" x2="126" y2="396" class="arr" marker-end="url(#arrow)"/>
  <line x1="316" y1="376" x2="276" y2="396" class="arr" marker-end="url(#arrow)"/>
  <line x1="364" y1="376" x2="426" y2="396" class="arr" marker-end="url(#arrow)"/>
  <line x1="400" y1="376" x2="565" y2="396" class="arr" marker-end="url(#arrow)"/>

  <!-- BaseAgent -->
  <rect x="60" y="462" width="560" height="44" rx="8" class="l-gray" stroke-width="0.5"/>
  <text class="th" x="340" y="480" text-anchor="middle">BaseAgent (abstract)</text>
  <text class="ts" x="340" y="496" text-anchor="middle">AzureOpenAI / OpenAI SDK · JSON mode · Zod validation · exponential back-off retry</text>

  <!-- External: LLM -->
  <rect x="44" y="542" width="290" height="56" rx="10" class="l-green" stroke-width="0.5"/>
  <text class="th" x="189" y="562" text-anchor="middle">Azure OpenAI / OpenAI API</text>
  <text class="ts" x="189" y="578" text-anchor="middle">GPT-4o · vision + JSON mode</text>

  <!-- External: Azure Monitor -->
  <rect x="356" y="542" width="280" height="56" rx="10" class="l-teal" stroke-width="0.5"/>
  <text class="th" x="496" y="562" text-anchor="middle">Azure Monitor</text>
  <text class="ts" x="496" y="578" text-anchor="middle">OpenTelemetry traces + metrics</text>

  <!-- Arrows: Frontend → Middleware -->
  <line x1="186" y1="128" x2="186" y2="144" class="arr" marker-end="url(#arrow)"/>
  <line x1="494" y1="128" x2="494" y2="144" class="arr" marker-end="url(#arrow)"/>

  <!-- Middleware → Services -->
  <line x1="186" y1="202" x2="186" y2="218" class="arr" marker-end="url(#arrow)"/>
  <line x1="340" y1="202" x2="340" y2="218" class="arr" marker-end="url(#arrow)"/>
  <line x1="494" y1="202" x2="546" y2="218" class="arr" marker-end="url(#arrow)"/>

  <!-- Services → Orchestrator -->
  <line x1="340" y1="276" x2="340" y2="326" class="arr" marker-end="url(#arrow)"/>

  <!-- BaseAgent → LLM -->
  <line x1="200" y1="506" x2="189" y2="540" class="arr" marker-end="url(#arrow)"/>

  <!-- BaseAgent → Azure Monitor -->
  <line x1="480" y1="506" x2="496" y2="540" class="arr" marker-end="url(#arrow)"/>
</svg>