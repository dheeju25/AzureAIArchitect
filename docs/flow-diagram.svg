<svg width="100%" viewBox="0 0 680 860" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: system-ui, sans-serif; }
      .th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .ts { font-size: 12px; font-weight: 400; fill: #555; }
      .arr { stroke: #888; stroke-width: 1.5; fill: none; }
      .leader { stroke: #aaa; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }
      .l-gray   { fill: #f5f5f4; stroke: #b4b2a9; }
      .l-blue   { fill: #e6f1fb; stroke: #85b7eb; }
      .l-teal   { fill: #e1f5ee; stroke: #5dcaa5; }
      .l-purple { fill: #eeedfe; stroke: #afa9ec; }
      .l-coral  { fill: #faece7; stroke: #f0997b; }
      .l-amber  { fill: #faeeda; stroke: #ef9f27; }
      .l-green  { fill: #eaf3de; stroke: #97c459; }
    </style>
  </defs>

  <!-- Step 1: User uploads -->
  <rect x="200" y="20" width="280" height="56" rx="10" class="l-gray" stroke-width="0.5"/>
  <text class="th" x="340" y="44" text-anchor="middle">User uploads diagram</text>
  <text class="ts" x="340" y="60" text-anchor="middle">PNG · SVG · draw.io · PDF · Visio</text>
  <line x1="340" y1="76" x2="340" y2="108" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 2: Middleware -->
  <rect x="200" y="108" width="280" height="56" rx="10" class="l-teal" stroke-width="0.5"/>
  <text class="th" x="340" y="132" text-anchor="middle">Express middleware</text>
  <text class="ts" x="340" y="148" text-anchor="middle">Multer upload · assign traceId · log span</text>
  <line x1="340" y1="164" x2="340" y2="196" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 3: File processor -->
  <rect x="200" y="196" width="280" height="56" rx="10" class="l-purple" stroke-width="0.5"/>
  <text class="th" x="340" y="220" text-anchor="middle">File processor</text>
  <text class="ts" x="340" y="236" text-anchor="middle">Detect format · convert to base64 PNG</text>
  <line x1="340" y1="252" x2="340" y2="284" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 4: Orchestrator -->
  <rect x="180" y="284" width="320" height="56" rx="10" class="l-coral" stroke-width="0.5"/>
  <text class="th" x="340" y="308" text-anchor="middle">OrchestratorAgent starts</text>
  <text class="ts" x="340" y="324" text-anchor="middle">Emits WS progress 0% · spawns pipeline</text>
  <line x1="340" y1="340" x2="340" y2="372" class="arr" marker-end="url(#arrow)"/>

  <!-- Progress labels -->
  <text class="ts" x="80" y="388" text-anchor="middle" fill="#999">0–25%</text>
  <path d="M112 388 L160 388" class="leader"/>
  <text class="ts" x="80" y="492" text-anchor="middle" fill="#999">25–45%</text>
  <path d="M112 492 L160 492" class="leader"/>
  <text class="ts" x="80" y="592" text-anchor="middle" fill="#999">50–70%</text>
  <path d="M112 592 L160 592" class="leader"/>
  <text class="ts" x="80" y="692" text-anchor="middle" fill="#999">70–90%</text>
  <path d="M112 692 L160 692" class="leader"/>
  <text class="ts" x="80" y="792" text-anchor="middle" fill="#999">90–100%</text>
  <path d="M112 792 L160 792" class="leader"/>

  <!-- Step 5: Analyzer -->
  <rect x="160" y="372" width="360" height="68" rx="10" class="l-blue" stroke-width="0.5"/>
  <text class="th" x="340" y="396" text-anchor="middle">AnalyzerAgent</text>
  <text class="ts" x="340" y="412" text-anchor="middle">GPT-4o vision call · extract resources</text>
  <text class="ts" x="340" y="426" text-anchor="middle">dependencies · architecture pattern → Zod</text>
  <line x1="340" y1="440" x2="340" y2="472" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 6: Policy -->
  <rect x="160" y="472" width="360" height="68" rx="10" class="l-blue" stroke-width="0.5"/>
  <text class="th" x="340" y="496" text-anchor="middle">PolicyComplianceAgent</text>
  <text class="ts" x="340" y="512" text-anchor="middle">Profile: Default · HIPAA · PCI DSS · SOX</text>
  <text class="ts" x="340" y="528" text-anchor="middle">Violations · score 0–100 · auto-fixable flags</text>
  <line x1="340" y1="540" x2="340" y2="572" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 7: Cost -->
  <rect x="160" y="572" width="360" height="68" rx="10" class="l-blue" stroke-width="0.5"/>
  <text class="th" x="340" y="596" text-anchor="middle">CostOptimizationAgent</text>
  <text class="ts" x="340" y="612" text-anchor="middle">Monthly estimates · right-sizing · reserved</text>
  <text class="ts" x="340" y="628" text-anchor="middle">Immediate / planned / strategic actions</text>
  <line x1="340" y1="640" x2="340" y2="672" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 8: Generator -->
  <rect x="160" y="672" width="360" height="68" rx="10" class="l-blue" stroke-width="0.5"/>
  <text class="th" x="340" y="696" text-anchor="middle">GeneratorAgent</text>
  <text class="ts" x="340" y="712" text-anchor="middle">Bicep + pipeline YAML + parameters.json</text>
  <text class="ts" x="340" y="728" text-anchor="middle">README · bakes compliance + cost fixes in</text>
  <line x1="340" y1="740" x2="340" y2="772" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 9: Package -->
  <rect x="160" y="772" width="360" height="56" rx="10" class="l-green" stroke-width="0.5"/>
  <text class="th" x="340" y="796" text-anchor="middle">Package ZIP + deliver</text>
  <text class="ts" x="340" y="812" text-anchor="middle">main.bicep · pipeline.yml · reports · README</text>

  <!-- WebSocket aside -->
  <rect x="542" y="284" width="118" height="56" rx="8" class="l-amber" stroke-width="0.5"/>
  <text class="th" x="601" y="308" text-anchor="middle">WebSocket</text>
  <text class="ts" x="601" y="324" text-anchor="middle">Live % to browser</text>
  <path d="M500 312 L542 312" class="leader" marker-end="url(#arrow)"/>
  <path d="M601 340 L601 790 L520 800" class="leader" marker-end="url(#arrow)"/>

  <!-- LLM aside -->
  <rect x="20" y="396" width="118" height="44" rx="8" class="l-green" stroke-width="0.5"/>
  <text class="th" x="79" y="414" text-anchor="middle">Azure OpenAI</text>
  <text class="ts" x="79" y="430" text-anchor="middle">GPT-4o calls</text>
  <path d="M138 418 L160 418" class="leader" marker-end="url(#arrow)"/>
</svg>